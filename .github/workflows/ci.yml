name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type checking
        run: pnpm lint:types

      - name: Run linting
        run: pnpm lint:biome

      - name: Run knip
        run: pnpm lint:knip

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: arocapi-downloader:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image at root and under a subpath
        run: |
          set -eu
          for bp in "" "/downloader"; do
            echo "--- Testing BASE_PATH='${bp}' ---"
            cid=$(docker run -d -p 7000:7000 \
              -e BASE_PATH="${bp}" \
              -e NODE_ENV=production \
              -e ROCRATE_API_BASE_URL=https://api.example.com \
              -e OIDC_ISSUER=https://idp.example.com \
              -e OIDC_CLIENT_ID=smoke-test \
              -e OIDC_CLIENT_SECRET=smoke-test \
              -e OIDC_REDIRECT_URI=https://app.example.com${bp}/api/auth/callback \
              -e SESSION_SECRET=smoke-test-secret-0123456789abcdef \
              -e S3_BUCKET=smoke-test \
              -e EMAIL_FROM=noreply@example.com \
              arocapi-downloader:test)

            if ! html=$(curl -fsS --retry 30 --retry-delay 1 --retry-all-errors "http://localhost:7000${bp}/"); then
              echo "FAIL: app did not respond at http://localhost:7000${bp}/"
              docker logs "$cid"
              exit 1
            fi
            if echo "$html" | grep -q '__BASE_PATH__'; then
              echo "FAIL: residual base path token in served HTML"
              exit 1
            fi
            if ! echo "$html" | grep -q "${bp}/assets/"; then
              echo "FAIL: asset URLs missing expected prefix '${bp}/assets/'"
              exit 1
            fi

            # Fetch a static asset too: curl fails on Content-Length mismatch,
            # which SSR HTML (dynamic response) cannot catch
            asset=$(echo "$html" | grep -o "\"${bp}/assets/[^\"]*\.js\"" | head -1 | tr -d '"')
            if ! curl -fsS -o /dev/null "http://localhost:7000${asset}"; then
              echo "FAIL: static asset ${asset} did not serve cleanly"
              exit 1
            fi

            docker rm -f "$cid" >/dev/null
          done
